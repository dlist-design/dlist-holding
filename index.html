<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dlist.ca</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 40px 48px;
    }

    #logo-wrap {
      margin-bottom: 52px;
      opacity: 0.9;
    }

    #logo-wrap svg {
      width: 200px;
      height: auto;
    }

    .headline {
      font-size: clamp(16px, 2.5vw, 24px);
      font-weight: 300;
      letter-spacing: -0.03em;
      color: #000;
      text-align: center;
      line-height: 1.35;
      margin-bottom: 6px;
    }

    .sub {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #999;
      text-align: center;
      margin-bottom: 40px;
    }

    #topo-wrap {
      width: 100%;
      max-width: 560px;
    }

    #topo-wrap canvas {
      display: block;
      width: 100%;
      height: auto;
      cursor: crosshair;
    }

    .hint {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #bbb;
      text-align: center;
      margin-top: 14px;
      margin-bottom: 14px;
    }

    .mode-row {
      display: flex;
      width: 100%;
      max-width: 560px;
    }

    .mode-btn {
      flex: 1;
      background: none;
      border: none;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #bbb;
      padding: 9px 0;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }

    .mode-btn.active {
      background: #000;
      color: #fff;
    }

    .mode-btn:not(.active):hover {
      color: #555;
    }

    #clear-btn {
      margin-top: 12px;
      background: none;
      border: none;
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #ddd;
      cursor: pointer;
      padding: 4px 0;
      transition: color 0.15s;
    }

    #clear-btn:hover {
      color: #000;
    }
  </style>
</head>

  <p class="headline">dlist.ca is taking a moment.<br>You're welcome to take one too.</p>
  <p class="sub">Back soon</p>

  <div id="topo-wrap">
    <canvas id="topo" width="560" height="320"></canvas>
  </div>

  <p class="hint">Click to place a peak &nbsp;&mdash;&nbsp; watch the terrain form</p>

  <div class="mode-row">
    <button class="mode-btn active" id="btn-build" onclick="setMode('build',this)">Build</button>
    <button class="mode-btn" id="btn-erode" onclick="setMode('erode',this)">Erode</button>
  </div>
  <button id="clear-btn" onclick="clearAll()">Clear</button>

  <script>
    const canvas = document.getElementById('topo');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    let peaks = [], mode = 'build';

    function setMode(m, btn) {
      mode = m;
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function elevation(x, y) {
      let v = 0;
      for (const p of peaks) {
        const dx = x - p.x, dy = y - p.y;
        v += p.h * Math.exp(-(dx * dx + dy * dy) / (2 * p.r * p.r));
      }
      return v;
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      if (!peaks.length) return;
      const levels = 14, step = 1 / (levels + 1);
      for (let li = 1; li <= levels; li++) {
        const t = li / levels;
        ctx.strokeStyle = `rgba(0,0,0,${0.1 + t * 0.25})`;
        ctx.lineWidth = 0.4 + t * 0.5;
        ctx.beginPath();
        march(li * step);
        ctx.stroke();
      }
    }

    function march(thresh) {
      const res = 4, eps = 1e-4;
      const cols = Math.floor(W / res), rows = Math.floor(H / res);
      const g = [];
      for (let r = 0; r <= rows; r++) {
        g[r] = [];
        for (let c = 0; c <= cols; c++) g[r][c] = elevation(c * res, r * res);
      }
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const tl = g[r][c], tr = g[r][c+1], br = g[r+1][c+1], bl = g[r+1][c];
          const x0 = c*res, y0 = r*res, x1 = x0+res, y1 = y0+res;
          const idx = ((tl>=thresh)?8:0)|((tr>=thresh)?4:0)|((br>=thresh)?2:0)|((bl>=thresh)?1:0);
          if (!idx || idx === 15) continue;
          const top    = [x0 + res*(thresh-tl)/(tr-tl||eps), y0];
          const right  = [x1, y0 + res*(thresh-tr)/(br-tr||eps)];
          const bottom = [x0 + res*(thresh-bl)/(br-bl||eps), y1];
          const left   = [x0, y0 + res*(thresh-tl)/(bl-tl||eps)];
          const segs = {
            1:[bottom,left], 2:[right,bottom], 3:[right,left], 4:[top,right],
            5:[[top,right],[bottom,left]], 6:[top,bottom], 7:[top,left], 8:[top,left],
            9:[top,bottom], 10:[[top,left],[right,bottom]], 11:[top,right],
            12:[right,left], 13:[right,bottom], 14:[bottom,left]
          };
          const s = segs[idx];
          if (!s) continue;
          if (Array.isArray(s[0][0])) {
            for (const e of s) { ctx.moveTo(e[0][0], e[0][1]); ctx.lineTo(e[1][0], e[1][1]); }
          } else {
            ctx.moveTo(s[0][0], s[0][1]); ctx.lineTo(s[1][0], s[1][1]);
          }
        }
      }
    }

    function interact(x, y) {
      const sc = canvas.getBoundingClientRect().width / W;
      peaks.push(mode === 'build'
        ? { x: x/sc, y: y/sc, h:  0.55 + Math.random()*0.45, r: 55 + Math.random()*65 }
        : { x: x/sc, y: y/sc, h: -(0.45 + Math.random()*0.35), r: 50 + Math.random()*55 });
      draw();
    }

    function clearAll() { peaks = []; draw(); }

    canvas.addEventListener('click', e => {
      const r = canvas.getBoundingClientRect();
      interact(e.clientX - r.left, e.clientY - r.top);
    });

    canvas.addEventListener('touchend', e => {
      e.preventDefault();
      const r = canvas.getBoundingClientRect();
      const t = e.changedTouches[0];
      interact(t.clientX - r.left, t.clientY - r.top);
    }, { passive: false });
  </script>
